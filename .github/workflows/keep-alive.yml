name: Keep Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging $RENDER_APP_URL/health ..."
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$RENDER_APP_URL/health" || true)

          if [ "$response" = "200" ]; then
            echo "✅ Health check passed (HTTP $response)"
          else
            echo "⚠️ Health check returned HTTP $response"
            exit 1
          fi
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
